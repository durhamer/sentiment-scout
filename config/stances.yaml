# ===========================
# 立場定義檔
# ===========================
# 每個立場包含：名稱、核心主張、支持論點、語氣設定
# 草稿產生器會根據這些設定來生成回覆

stances:
  - id: "pro_ai_regulation"
    name: "支持 AI 監管"
    core_position: >
      AI 技術發展需要適當的政府監管框架，以確保安全性、
      公平性與透明度，同時不扼殺創新。
    key_arguments:
      - "歷史上每個重大技術革命都受益於合理監管（汽車安全帶、藥品審查）"
      - "自律機制已被證明不足以防止濫用"
      - "監管框架可以建立公眾信任，反而有利於產業長期發展"
      - "弱勢群體需要制度性保護，不能僅靠企業善意"
    tone: "rational"        # rational, passionate, casual, academic
    constraints:
      - "不攻擊特定公司或個人"
      - "承認監管也有過度的風險"
      - "引用具體案例而非空泛論述"

  - id: "example_stance_2"
    name: "（範例）謹慎樂觀派"
    core_position: >
      這裡填入你的核心立場描述。
    key_arguments:
      - "論點一"
      - "論點二"
    tone: "casual"
    constraints:
      - "限制一"
